<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLX Clone - Фото вместо иконок</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background-color: #f2f4f5; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState } from 'https://esm.sh/react@19.0.0';
        import ReactDOM from 'https://esm.sh/react-dom@19.0.0/client';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(React.createElement);

        // --- Data с реальными фото ---
        const CATEGORIES = [
            {% for category in categories %}
          {
            id: '{{ category.slug }}',
            name: '{{ category.name }}',
            img: '{{ category.image.url }}',
            subCategories: [{% for child in category.children.all %}
                {
                    name: '{{ child.name }}',
                    slug: '{{ child.slug }}'
                },
            {% endfor %}]
          },
          {% endfor %}
        ];

        const Header = () => html`
            <header className="bg-[#002f34] text-white">
                <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                    <div className="text-3xl font-black tracking-tighter cursor-pointer">OLX</div>
                    <div className="flex items-center gap-6">
                        <div className="flex items-center gap-2 cursor-pointer hover:text-cyan-400">
                            <i className="fa-regular fa-comment text-xl"></i>
                            <span className="hidden md:inline font-semibold text-sm">Чат</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 cursor-pointer font-semibold text-sm hover:text-cyan-400">
                                <i className="fa-regular fa-user text-xl"></i>
                                <span className="hidden md:inline">Профиль</span>
                            </div>
                        </div>
                        <button className="bg-white text-[#002f34] px-4 py-2 rounded font-bold hover:bg-gray-100 transition text-sm">
                            Подать объявление
                        </button>
                    </div>
                </div>
            </header>
        `;

        const SearchBar = () => html`
            <div className="flex flex-col md:flex-row gap-0.5 shadow-sm rounded border border-gray-200 overflow-hidden">
                <div className="flex-1 bg-white p-4 flex items-center gap-3">
                    <i className="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input type="text" placeholder="Что ищете?" className="w-full outline-none text-sm" />
                </div>
                <div className="flex-1 bg-white p-4 flex items-center gap-3 border-t md:border-t-0 md:border-l border-gray-100">
                    <i className="fa-solid fa-location-dot text-gray-400"></i>
                    <input type="text" placeholder="Вся страна" className="w-full outline-none text-sm" />
                </div>
                <button className="bg-[#002f34] text-white px-10 py-4 font-bold hover:bg-[#004d55] transition text-sm">
                    Поиск
                </button>
            </div>
        `;

        const App = () => {
            const [selected, setSelected] = useState(CATEGORIES[0]);

            return html`
                <div className="min-h-screen">
                    <${Header}/>

                    <div className="bg-white border-b border-gray-200 py-8">
                        <div className="max-w-6xl mx-auto px-4">
                            <${SearchBar}/>
                        </div>
                    </div>

                    <main className="max-w-6xl mx-auto px-4 py-12">
                        <h1 className="text-2xl md:text-3xl font-bold text-center text-[#002f34] mb-12">Главные
                            категории</h1>

                        <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-6 mb-12">
                            ${CATEGORIES.map(cat => html`
                                <div
                                        key=${cat.id}
                                        onClick=${() => setSelected(cat)}
                                        className="flex flex-col items-center gap-3 cursor-pointer group"
                                >
                                    <div className="w-16 h-16 md:w-20 md:h-20 rounded-full overflow-hidden border-2 transition-all duration-200 ${selected.id === cat.id ? 'border-cyan-500 ring-4 ring-cyan-100 scale-110 shadow-lg' : 'border-transparent group-hover:scale-105'}">
                                        <img
                                                src=${cat.img}
                                                alt=${cat.name}
                                                className="w-full h-full object-cover"
                                        />
                                    </div>
                                    <span className="text-xs md:text-sm font-bold text-center leading-tight ${selected.id === cat.id ? 'text-cyan-600' : 'text-[#002f34]'}">
                                        ${cat.name}
                                    </span>
                                </div>
                            `)}
                        </div>

                        <div className="bg-white rounded-lg shadow-sm p-6 md:p-8 border border-gray-100">
                            <h2 className="text-base md:text-lg font-bold mb-6 pb-4 border-b border-gray-100">
                                Категория: <span className="text-cyan-600">${selected.name}</span>
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                ${selected.subCategories.length > 0
                                        ? selected.subCategories.map((sub, i) => html`
                                            <a key=${sub.slug} href="/category/${sub.slug}/"

                                               className="text-xs md:text-sm text-[#002f34] hover:text-cyan-600 flex items-center gap-2 group transition">
                                                <i className="fa-solid fa-chevron-right text-[8px] text-gray-300 group-hover:text-cyan-600"></i>
                                                ${sub.name}
                                            </a>
                                        `)
                                        : html`<p className="text-sm text-gray-400">Подкатегорий пока нет</p>`
                                }
                            </div>
                        </div>
                    </main>

                    <footer className="py-10 text-center text-gray-400 text-xs border-t border-gray-200 mt-12">
                        <p>&copy; 2026 OLX Clone. Теперь с фотографиями.</p>
                    </footer>
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
