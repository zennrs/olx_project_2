<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Search Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f2f4f5; }
        .header { background: #002f34; color: white; padding: 15px 30px; }
        .container { width: 1200px; margin: auto; }
        .search-bar { background: white; padding: 15px; margin-top: 20px; display: flex; gap: 10px; }
        .layout { display: flex; gap: 20px; margin-top: 20px; }
        .sidebar { width: 260px; background: white; padding: 15px; }
        .content { flex: 1; }
        .card { background: white; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; }
        .thumb { width: 120px; height: 90px; background: #ddd; }
        .title { font-weight: bold; }
        .price { margin-left: auto; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <strong>OLX</strong>
    </div>
</div>

<div class="container">

    <!-- SEARCH -->
    <div class="search-bar">
        <input type="text" placeholder="Search..." style="flex:1; padding:8px;">
        <button>Search</button>
    </div>

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div style="height:40px; background:#eee; margin-bottom:10px;"></div>
            <div style="height:40px; background:#eee;"></div>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- CARD -->
           {% for announcement in results %}
            <div class="card">
                <div class="thumb">
                    <img src="{{ announcement.images.first.image.url }}"  style="width:100%; height:100%; object-fit:cover;">
                </div>

                <div style="flex:1;">
                    <div class="title">
                        {{ announcement.name }}
                    </div>

                    <div class="meta">
                        {{ announcement.created_at|date:"d.m.Y H:i" }}
                    </div>
                </div>

                <div class="price">
                    {{ announcement.price }}
                </div>
            </div>
            {% empty %}
                <p>Hech narsa topilmadi</p>
            {% endfor %}

        </div>

    </div>
</div>

</body>
</html>
